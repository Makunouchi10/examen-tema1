<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dibujo Canvas Geométrico</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/img/carro.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
        <a class="navbar-brand" href="#">Proyecto Canvas 2D</a>
        <span class="navbar-text text-white ms-auto">
            Desarrollado por: Ing. Yael Hernandez Jimenez
        </span>
    </nav>

    <div class="container py-5">
        <div class="row">

            <!-- Lado Izquierdo: Canvas -->
            <div class="col-md-6 text-center">
                <h4>Dibujo por Programación</h4>
                <canvas id="miCanvas" width="500" height="500" class="border shadow"></canvas>
            </div>

            <!-- Lado Derecho: Imagen original -->
            <div class="col-md-6 text-center">
                <h4>Imagen Original</h4>
                <img src="assets/img/image.png" class="img-fluid shadow border" alt="Imagen Original">
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3">
        <p>© 2024 - Proyecto Canvas | Ing. Yael Hernandez Jimenez</p>
    </footer>

    <!-- JS -->
    <script src="assets/js/main.js"></script>
</body>

</html>
